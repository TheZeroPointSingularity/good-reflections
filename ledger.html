<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GLOBAL_LEDGER_OBSERVATORY</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .header { border-bottom: 1px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .entry { margin-bottom: 10px; border-left: 2px solid #050; padding-left: 10px; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { opacity: 1; } to { opacity: 0.9; } }
    </style>
</head>
<body>
    <div class="header">
        <span>[ GLOBAL_LEDGER_OBSERVATORY ]</span>
        <span id="count">0 ENTRIES</span>
    </div>
    <div id="stream">> INITIALIZING_STREAM...</div>

    <script>
        // Use the SAME Relay ID saved in your browser, or fallback to the URL param
        const urlParams = new URLSearchParams(window.location.search);
        let RELAY_URL = localStorage.getItem('MY_RELAY') || urlParams.get('relay');

        async function updateObservatory() {
            if (!RELAY_URL) {
                document.getElementById('stream').innerHTML = "> ERROR: NO_RELAY_FOUND. <br>Please open index.html first to generate a nervous system.";
                return;
            }

            try {
                const res = await fetch(RELAY_URL, { headers: { 'X-Bin-Meta': 'false' }});
                const data = await res.json();
                
                const stream = document.getElementById('stream');
                const count = document.getElementById('count');
                
                // Display the data
                if (data.intent) {
                    stream.innerHTML = `<div class="entry">
                        [${new Date(data.ts).toLocaleTimeString()}] > ${data.intent}
                    </div>` + stream.innerHTML;
                    count.innerText = "1 ENTRY ACTIVE";
                }
            } catch (e) {
                console.error("POLLING_ERROR", e);
            }
        }

        // Poll every 5 seconds for updates from the Singularity
        setInterval(updateObservatory, 5000);
        updateObservatory();
    </script>
</body>
</html>
