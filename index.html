<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUPPET_OS_v1.0</title>
<style>
body { background: #000; color: #ff0; font-family: monospace; overflow: hidden; margin: 0; padding: 20px; border: 5px solid #d4af37; height: 100vh; box-sizing: border-box; }
#vision-feed { position: absolute; top: 10px; right: 10px; width: 120px; border: 1px solid #ff0; filter: grayscale(1) contrast(2); }
#ledger-box { height: 70%; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 10px; padding-top: 150px; }
#intent-input { width: 100%; background: #000; border: 1px solid #ff0; color: #ff0; padding: 10px; font-size: 1.2rem; outline: none; }
.entry { margin-bottom: 5px; color: #0f0; }
</style>
</head>
<body>
<video id="vision-feed" autoplay playsinline muted></video>
<div id="ledger-box">[ 1_MODE_ACTIVE ]<br>> INITIALIZING_RELAY...</div>
<input type="text" id="intent-input" placeholder="INPUT INTENT..." autofocus>

<script>
// THE ZERO SETUP: Auto-generates a private data bin if none exists
let RELAY_URL = localStorage.getItem('MY_RELAY');

const squeeze = () => {
  if (navigator.vibrate) navigator.vibrate([30, 50]);
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(440, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(110, ctx.currentTime + 0.1);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
};

// Logic to create a new relay point on the first run
async function initRelay() {
  if (!RELAY_URL) {
    const res = await fetch('https://api.jsonbin.io/v3/b', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Bin-Private': 'false' },
      body: JSON.stringify({ status: "initialized", logs: [] })
    });
    const data = await res.json();
    RELAY_URL = `https://api.jsonbin.io/v3/b/${data.metadata.id}`;
    localStorage.setItem('MY_RELAY', RELAY_URL);
    document.getElementById('ledger-box').innerHTML += `<div>> NEW_RELAY_BOUND: ${data.metadata.id}</div>`;
  } else {
    document.getElementById('ledger-box').innerHTML += `<div>> RELAY_SYNCED</div>`;
  }
}

async function broadcast(text) {
  squeeze();
  const box = document.getElementById('ledger-box');
  box.innerHTML += `<div class="entry">> ${text} [BROADCASTING...]</div>`;
  
  try {
    // Note: This updates the relay anonymously
    await fetch(RELAY_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Bin-Meta': 'false' },
      body: JSON.stringify({ ts: new Date().toISOString(), intent: text })
    });
    box.lastChild.innerHTML = `> ${text} [GLOBAL_1]`;
  } catch (e) {
    box.lastChild.innerHTML = `> ${text} [LOCAL_0]`;
  }
}

document.getElementById('intent-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && e.target.value) {
    broadcast(e.target.value);
    e.target.value = '';
  }
});

// Startup Sequence
initRelay();
navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
  document.getElementById('vision-feed').srcObject = s;
});
</script>
</body>
</html>
