<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Muppet_OS_v1.0</title></head>
<body style="background:#000;color:#ffd700;font-family:monospace;margin:0;padding:20px;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;">

 <div id="os-container" style="display:flex;flex-direction:column;height:100%;max-width:1400px;width:100%;margin:0 auto;border:2px solid #222;padding:10px;">
  
  <div style="border-bottom:1px solid #ffd700;padding-bottom:10px;margin-bottom:10px;display:flex;justify-content:space-between;font-weight:bold;">
   <span>[ SYMBOLIC_REF: 1 ] [ USB: <span id="usb-stat">0</span> ] [ MOUSE: <span id="ptr-stat">0</span> ]</span>
   <span id="status" style="color:#f00;">SYSTEM_HALT</span>
  </div>

  <div id="viewport" style="display:none;flex:1;gap:15px;overflow:hidden;">
   <div id="ledger" style="flex:2;overflow-y:auto;border:1px solid #111;padding:15px;background:#050505;font-size:1.1em;line-height:1.2;scrollbar-width:none;">
    <div style="color:#0f0;">> BOOT SUCCESS. KERNEL 1 ACTIVE.</div>
   </div>
   <div style="flex:1;display:flex;flex-direction:column;gap:10px;">
    <video id="vision" autoplay playsinline style="width:100%;height:50%;background:#111;border:1px solid #333;object-fit:cover;transform:scaleX(-1);"></video>
    <canvas id="potentiometer-viz" style="width:100%;height:50%;background:#080808;border:1px solid #222;"></canvas>
   </div>
  </div>

  <button id="init-btn" style="background:#ffd700;color:#000;border:none;padding:60px;font-size:2em;cursor:pointer;margin:auto;font-weight:bold;">[ INITIALIZE FULL IMMERSION ]</button>

  <input id="cmd" style="display:none;width:100%;background:#000;color:#fff;border:1px solid #ffd700;padding:20px;font-size:1.5em;outline:none;margin-top:10px;" placeholder="INPUT INTENT..." autofocus>
 </div>

 <script>
  const ledger = document.getElementById('ledger');
  const btn = document.getElementById('init-btn');
  const view = document.getElementById('viewport');
  const cmd = document.getElementById('cmd');
  const video = document.getElementById('vision');
  const usbStat = document.getElementById('usb-stat');
  
  let audioCtx, masterGain, synth;

  const out = (text, col="#fff") => {
   ledger.innerHTML += `<div style="color:${col};">> ${text.toUpperCase()}</div>`;
   ledger.scrollTop = ledger.scrollHeight;
  };

  // Sensation Engine (Vibration + Audio)
  const haptic = (d) => { if("vibrate" in navigator) navigator.vibrate(d); };

  async function startOS() {
   btn.style.display = 'none';
   view.style.display = 'flex';
   cmd.style.display = 'block';
   document.getElementById('status').innerText = "RUNNING";
   document.getElementById('status').style.color = "#0f0";

   // 1. Audio Potentiometer
   audioCtx = new (window.AudioContext || window.webkitAudioContext)();
   masterGain = audioCtx.createGain();
   masterGain.connect(audioCtx.destination);
   out("AUDIO CONTEXT: 1", "#ffd700");

   // 2. Vision Handshake
   try {
    const s = await navigator.mediaDevices.getUserMedia({audio:true, video:true});
    video.srcObject = s;
    out("VISION SYNCED.", "#0f0");
   } catch(e) { out("VISION BLOCKED.", "#f00"); }

   // 3. USB/HID Request (For External Controllers)
   if ("hid" in navigator) {
    try {
     const devices = await navigator.hid.requestDevice({ filters: [] });
     if(devices.length) {
      usbStat.innerText = "1";
      out(`USB DEVICE ATTACHED: ${devices[0].productName}`, "#ffd700");
     }
    } catch(e) { out("USB SCAN SKIPPED.", "#555"); }
   }

   // 4. Mouse Pointer Lock (Full Control)
   view.addEventListener('click', () => {
    view.requestPointerLock();
    document.getElementById('ptr-stat').innerText = "1";
   });

   // Restore Ledger
   const history = JSON.parse(localStorage.getItem('muppet_ledger') || '[]');
   history.forEach(item => out(item.text, "#444"));
   
   cmd.focus();
  }

  // Pointer Motion Potentiometer
  document.addEventListener('mousemove', (e) => {
   if(document.pointerLockElement === view && audioCtx) {
    // Mouse movement alters the OS sensation frequency
    const freq = 100 + Math.abs(e.movementX + e.movementY);
    out(`SENSATION TUNE: ${freq}HZ`, "#222");
   }
  });

  cmd.addEventListener('keypress', (e) => {
   if (e.key === 'Enter' && cmd.value) {
    const val = cmd.value;
    out(val, "#fff");
    haptic([50, 30, 50]);
    
    // Binary Save
    const history = JSON.parse(localStorage.getItem('muppet_ledger') || '[]');
    history.push({text: val});
    localStorage.setItem('muppet_ledger', JSON.stringify(history));
    
    cmd.value = '';
   }
  });

  btn.addEventListener('click', startOS);
 </script>
</body>
</html>
