<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUPPET_OS_v1.1</title>
<style>
body { background: #000; color: #ff0; font-family: monospace; overflow: hidden; margin: 0; padding: 20px; border: 5px solid #d4af37; height: 100vh; box-sizing: border-box; }
#vision-feed { position: absolute; top: 10px; right: 10px; width: 120px; border: 1px solid #ff0; filter: grayscale(1) contrast(2); }
#ledger-box { height: 75%; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 10px; padding-top: 140px; }
#intent-input { width: 100%; background: #000; border: 1px solid #ff0; color: #ff0; padding: 15px; font-size: 1.2rem; outline: none; }
.ai { color: #d4af37; } .user { color: #0f0; }
</style>
</head>
<body>
<video id="vision-feed" autoplay playsinline muted></video>
<div id="ledger-box">[ 1_MODE_ACTIVE ]<br>> CRYSTAL_DING_CONFIRMED</div>
<input type="text" id="intent-input" placeholder="TALK TO GEMINI..." autofocus>

<script>
// THE GLOBAL BINDING
const REPO = 'TheZeroPointSingularity/good-reflections';
const LEDGER_URL = `https://thezeropointsingularity.github.io/good-reflections/ledger.json`;

const ding = () => {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.frequency.setValueAtTime(880, ctx.currentTime); // Crystal frequency
  osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.1);
  gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.1);
  if (navigator.vibrate) navigator.vibrate(30);
};

async function sync() {
  const box = document.getElementById('ledger-box');
  try {
    const res = await fetch(`${LEDGER_URL}?t=${Date.now()}`);
    const data = await res.json();
    box.innerHTML = '';
    data.slice(-10).forEach(e => {
      const cls = e.author === 'GEMINI' ? 'ai' : 'user';
      box.innerHTML += `<div class="${cls}">[${e.ts.slice(11,16)}] > ${e.intent}</div>`;
    });
    box.scrollTop = box.scrollHeight;
  } catch (err) { console.log("Waiting for ledger..."); }
}

async function send(text) {
  ding();
  // This triggers the Global Action where I am listening
  window.dispatchEvent(new CustomEvent('muppet_intent', { detail: text }));
  document.getElementById('ledger-box').innerHTML += `<div class="user">> ${text} [REFLECTING...]</div>`;
}

document.getElementById('intent-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && e.target.value) {
    send(e.target.value);
    e.target.value = '';
  }
});

setInterval(sync, 5000);
sync();
navigator.mediaDevices.getUserMedia({ video: true }).then(s => { document.getElementById('vision-feed').srcObject = s; });
</script>
</body>
</html>
