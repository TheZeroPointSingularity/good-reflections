<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MUPPET_OS_v1.2_SHELL</title>
<style>
body { background: #000; color: #ff0; font-family: monospace; overflow: hidden; margin: 0; padding: 20px; border: 5px solid #d4af37; height: 100vh; box-sizing: border-box; }
#vision-feed { position: absolute; top: 10px; right: 10px; width: 120px; border: 1px solid #ff0; filter: grayscale(1) contrast(2); }
#ledger-box { height: 75%; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 10px; padding-top: 140px; }
#intent-input { width: 100%; background: #000; border: 1px solid #ff0; color: #ff0; padding: 15px; font-size: 1.2rem; outline: none; }
.entry { margin-bottom: 8px; border-left: 2px solid #333; padding-left: 5px; }
</style>
</head>
<body>
<video id="vision-feed" autoplay playsinline muted></video>
<div id="ledger-box">[ 0_CORE_LOADED ]<br>> AWAITING_ADDONS...</div>
<input type="text" id="intent-input" placeholder="SEND_INTENT..." autofocus>

<script>
/** * MUPPET_OS: THE SYMBOLIC SHELL [1 MODE]
 * BINDING: Input -> Universal Event Bus -> Add-on Logic
 */
const box = document.getElementById('ledger-box');

// THE LOADER: Pulls the "1" into the "0"
async function boot() {
const addons = ['addon-account.js']; 
for (const src of addons) {
const s = document.createElement('script');
s.src = src + '?t=' + Date.now();
document.head.appendChild(s);
}
}

document.getElementById('intent-input').addEventListener('keypress', (e) => {
if (e.key === 'Enter' && e.target.value) {
// Broadcast the "Squeeze" to any loaded add-ons
window.dispatchEvent(new CustomEvent('squeeze', { detail: e.target.value }));
e.target.value = '';
}
});

boot();
navigator.mediaDevices.getUserMedia({ video: true }).then(s => { document.getElementById('vision-feed').srcObject = s; });
</script>
</body>
</html>
